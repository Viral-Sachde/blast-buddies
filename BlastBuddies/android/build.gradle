buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

// Must run BEFORE apply plugin: "com.facebook.react.rootproject" because that
// plugin eagerly evaluates all subprojects, making afterEvaluate too late.
subprojects { subproject ->
    // Ensure Reanimated 3.x picks the new-arch source path.
    subproject.ext.set("newArchEnabled", "true")

    // plugins.withId fires when the Android library plugin is applied (during
    // evaluation), so source-set exclusions are registered at the right time.
    subproject.plugins.withId("com.android.library") {
        if (subproject.name == "react-native-reanimated") {
            [
                "**/layoutReanimation/ReaLayoutAnimator.java",
                "**/layoutReanimation/ReanimatedUIManager.java",
                "**/layoutReanimation/ReanimatedUIImplementation.java",
            ].each { pattern ->
                subproject.android.sourceSets.main.java.exclude(pattern)
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
