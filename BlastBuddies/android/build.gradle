buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Propagate new-arch flag to all subprojects before they evaluate.
subprojects { subproject ->
    subproject.ext.set("newArchEnabled", "true")
}

// gradle.afterProject fires right after each subproject is evaluated but before
// task execution — safe to modify source sets here.
gradle.afterProject { project ->
    if (project.name == "react-native-reanimated") {
        try {
            def mainSrcSet = project.android.sourceSets.getByName("main")
            [
                "**/layoutReanimation/ReaLayoutAnimator.java",
                "**/layoutReanimation/ReanimatedUIManager.java",
                "**/layoutReanimation/ReanimatedUIImplementation.java",
            ].each { pattern -> mainSrcSet.java.exclude(pattern) }
        } catch (Exception ignored) {}
    }
}
