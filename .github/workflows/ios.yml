name: iOS Build

on:
  push:
    branches: [main, 'claude/pensive-davinci-TRBiL']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Debug build (simulator)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: BlastBuddies

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: BlastBuddies/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: BlastBuddies/ios/Pods
          key: pods-${{ hashFiles('BlastBuddies/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build for simulator (no signing)
        run: |
          xcodebuild \
            -workspace ios/BlastBuddies.xcworkspace \
            -scheme BlastBuddies \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
