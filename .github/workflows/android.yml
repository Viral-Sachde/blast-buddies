name: Android Build

on:
  push:
    branches: [main, 'claude/pensive-davinci-TRBiL']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BlastBuddies

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install JS dependencies
        run: npm install

      - name: Patch Reanimated for RN 0.85 new arch
        run: python3 scripts/patch-reanimated.py

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('BlastBuddies/android/**/*.gradle*', 'BlastBuddies/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BlastBuddies-debug-${{ github.run_number }}
          path: BlastBuddies/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
